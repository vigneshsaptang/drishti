services:
  # ── Backend API + Built Frontend ─────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sigint-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      tor:
        condition: service_started
    networks:
      - sigint

  # ── Caddy Reverse Proxy (auto HTTPS) ────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: sigint-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
    depends_on:
      - backend
    networks:
      - sigint

  # ── Tor SOCKS5 Proxy (for .onion rendering) ─────────────
  tor:
    image: dperson/torproxy:latest
    container_name: sigint-tor
    restart: unless-stopped
    ports:
      - "${TOR_SOCKS_PORT:-9050}:9050"
      - "${TOR_HTTP_PORT:-8118}:8118"
    networks:
      - sigint

volumes:
  caddy_data:
  caddy_config:

networks:
  sigint:
    driver: bridge
